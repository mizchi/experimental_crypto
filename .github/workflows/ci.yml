name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.target }}, ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [wasm-gc, native, js]
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        with:
          use-flakehub: "disabled"
          use-gha-cache: "enabled"

      - name: Prepare Moon registry cache
        run: mkdir -p ~/.moon/registry

      - name: Cache Moon registry
        uses: actions/cache@v5
        with:
          path: ~/.moon/registry
          key: moon-registry-${{ runner.os }}-${{ hashFiles('flake.lock', 'moon.work', '**/moon.mod', '**/moon.pkg') }}
          restore-keys: |
            moon-registry-${{ runner.os }}-

      - name: Preflight (provers visible)
        run: |
          nix develop --impure --command bash -c '
            why3 --version | head -1
            z3 --version | head -1
            cvc5 --version | head -1
            alt-ergo --version | head -1
            moon version | head -1
          '

      - name: moon test
        run: |
          nix develop --impure --command bash -c '
            unset MOON_HOME
            bash scripts/ci_retry.sh moon update >/dev/null
            bash scripts/ci_retry.sh moon test --target "${{ matrix.target }}"
          '

  pgp-gpg-interop:
    name: pgp sign-side OpenPGP interop (ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        with:
          use-flakehub: "disabled"
          use-gha-cache: "enabled"

      - name: Prepare Moon registry cache
        run: mkdir -p ~/.moon/registry

      - name: Cache Moon registry
        uses: actions/cache@v5
        with:
          path: ~/.moon/registry
          key: moon-registry-${{ runner.os }}-${{ hashFiles('flake.lock', 'moon.work', '**/moon.mod', '**/moon.pkg') }}
          restore-keys: |
            moon-registry-${{ runner.os }}-

      - name: gpg verifies MoonBit PGP sign output
        run: |
          nix develop --impure --command bash -c '
            unset MOON_HOME
            bash scripts/ci_retry.sh moon update >/dev/null
            bash pgp/gpg_interop.sh
          '

      - name: sq verifies MoonBit PGP v6 sign output
        run: |
          nix develop --impure --command bash -c '
            unset MOON_HOME
            bash scripts/ci_retry.sh moon update >/dev/null
            bash pgp/sq_v6_interop.sh
          '

  tls13-interop:
    name: tls13 live client interop (openssl s_server, ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        with:
          use-flakehub: "disabled"
          use-gha-cache: "enabled"

      - name: Prepare Moon registry cache
        run: mkdir -p ~/.moon/registry

      - name: Cache Moon registry
        uses: actions/cache@v5
        with:
          path: ~/.moon/registry
          key: moon-registry-${{ runner.os }}-${{ hashFiles('flake.lock', 'moon.work', '**/moon.mod', '**/moon.pkg') }}
          restore-keys: |
            moon-registry-${{ runner.os }}-

      # Local-only: drives the MoonBit TLS 1.3 client (compiled to JS) through a
      # full 1-RTT handshake against openssl s_server for all three cipher
      # suites, validating the chain to a local test CA. No outbound network.
      - name: MoonBit tls13 client interops with openssl s_server
        run: |
          nix develop --impure --command bash -c '
            unset MOON_HOME
            bash scripts/ci_retry.sh moon update >/dev/null
            bash tests/tls13_interop/run.sh
          '

  leakage-smoke:
    name: leakage harness smoke (native, ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        with:
          use-flakehub: "disabled"
          use-gha-cache: "enabled"

      - name: Prepare Moon registry cache
        run: mkdir -p ~/.moon/registry

      - name: Cache Moon registry
        uses: actions/cache@v5
        with:
          path: ~/.moon/registry
          key: moon-registry-${{ runner.os }}-${{ hashFiles('flake.lock', 'moon.work', '**/moon.mod', '**/moon.pkg') }}
          restore-keys: |
            moon-registry-${{ runner.os }}-

      - name: leakage harness smoke
        run: |
          # shellcheck disable=SC2016
          nix develop --impure .#leakage --command bash -c '
            unset MOON_HOME
            bash scripts/ci_retry.sh moon update >/dev/null
            bash leakage_harness/workload_registry_selftest.sh
            bash leakage_harness/callgrind_check_selftest.sh
            bash leakage_harness/dudect_check_selftest.sh
            bash leakage_harness/timing_check_selftest.sh
            bash leakage_harness/profile_summary_selftest.sh
            bash leakage_harness/profile_evidence_gate_selftest.sh
            moon run --target native ./leakage_harness -- list
            : >leakage-dudect-backends.tsv
            first_dudect_report=1
            for target in wasm-gc wasm; do
              report="leakage-dudect-$target.tsv"
              LEAKAGE_DUDECT_TARGET="$target" \
                LEAKAGE_DUDECT_MEASUREMENTS=32 \
                LEAKAGE_DUDECT_ROUNDS=1 \
                LEAKAGE_DUDECT_TRIALS=1 \
                LEAKAGE_DUDECT_THRESHOLDS=leakage_harness/timing_backend_smoke_thresholds.tsv \
                LEAKAGE_DUDECT_REPORT="$report" \
                bash leakage_harness/dudect_check.sh
              if [ "$first_dudect_report" -eq 1 ]; then
                cat "$report" >leakage-dudect-backends.tsv
                first_dudect_report=0
              else
                tail -n +2 "$report" >>leakage-dudect-backends.tsv
              fi
            done
            cat leakage-dudect-backends.tsv
            LEAKAGE_TIMING_SAMPLES=8 \
              LEAKAGE_TIMING_INNER=1 \
              LEAKAGE_TIMING_TRIALS=3 \
              LEAKAGE_TIMING_THRESHOLDS=leakage_harness/timing_smoke_thresholds.tsv \
              LEAKAGE_TIMING_REPORT=leakage-timing.tsv \
              bash leakage_harness/timing_check.sh
            cat leakage-timing.tsv
            : >leakage-timing-backends.tsv
            first_backend_report=1
            for target in js wasm-gc wasm; do
              report="leakage-timing-$target.tsv"
              LEAKAGE_TIMING_TARGET="$target" \
                LEAKAGE_TIMING_SAMPLES=2 \
                LEAKAGE_TIMING_INNER=1 \
                LEAKAGE_TIMING_TRIALS=1 \
                LEAKAGE_TIMING_THRESHOLDS=leakage_harness/timing_backend_smoke_thresholds.tsv \
                LEAKAGE_TIMING_REPORT="$report" \
                bash leakage_harness/timing_check.sh
              if [ "$first_backend_report" -eq 1 ]; then
                cat "$report" >leakage-timing-backends.tsv
                first_backend_report=0
              else
                tail -n +2 "$report" >>leakage-timing-backends.tsv
              fi
            done
            cat leakage-timing-backends.tsv
            LEAKAGE_CALLGRIND_ITERS=1 \
              LEAKAGE_CALLGRIND_WORKLOADS="crypto_bigint-add_mod crypto_bigint-sub_mod crypto_bigint-mul_mod crypto_bigint-pow_mod crypto_bigint-inv_mod p256-nonce-inv p384-nonce-inv p521-nonce-inv secp256k1-nonce-inv x25519-diffie_hellman ed25519-sign rsa-pkcs1v15-sign jwe-rsa-oaep-decrypt p256-sign p384-sign p521-sign secp256k1-sign" \
              LEAKAGE_CALLGRIND_THRESHOLDS=leakage_harness/callgrind_smoke_thresholds.tsv \
              LEAKAGE_CALLGRIND_REPORT=leakage-callgrind.tsv \
              bash leakage_harness/callgrind_check.sh
            cat leakage-callgrind.tsv
            bash leakage_harness/profile_summary.sh \
              leakage-timing.tsv \
              leakage-timing-backends.tsv \
              leakage-dudect-backends.tsv \
              leakage-callgrind.tsv
          '

  prove:
    name: prove (ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d
        with:
          use-flakehub: "disabled"
          use-gha-cache: "enabled"

      - name: Prepare Moon registry cache
        run: mkdir -p ~/.moon/registry

      - name: Cache Moon registry
        uses: actions/cache@v5
        with:
          path: ~/.moon/registry
          key: moon-registry-${{ runner.os }}-${{ hashFiles('flake.lock', 'moon.work', '**/moon.mod', '**/moon.pkg') }}
          restore-keys: |
            moon-registry-${{ runner.os }}-

      - name: Preflight (provers visible)
        run: |
          nix develop --impure --command bash -c '
            why3 --version | head -1
            z3 --version | head -1
            cvc5 --version | head -1
            alt-ergo --version | head -1
            moon version | head -1
          '

      - name: moon prove
        run: |
          nix develop --impure --command bash proofs/setup.sh
          nix develop --impure --command bash -c '
            unset MOON_HOME
            bash scripts/ci_retry.sh moon update >/dev/null
            bash proofs/prove.sh
          '
