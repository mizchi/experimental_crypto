name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.target }}, ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [wasm-gc, native, js]
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Preflight (provers visible)
        run: |
          nix develop --impure --command bash -c '
            why3 --version | head -1
            z3 --version | head -1
            cvc5 --version | head -1
            alt-ergo --version | head -1
            moon version | head -1
          '

      - name: moon test
        run: |
          nix develop --impure --command bash -c '
            unset MOON_HOME
            moon update >/dev/null
            moon test --target "${{ matrix.target }}"
          '

  leakage-smoke:
    name: leakage harness smoke (native, ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: leakage harness smoke
        run: |
          nix develop --impure .#leakage --command bash -c '
            unset MOON_HOME
            moon update >/dev/null
            bash leakage_harness/callgrind_check_selftest.sh
            moon run --target native ./leakage_harness -- list
            moon run --target native ./leakage_harness -- compare 2 1 1000000
            LEAKAGE_CALLGRIND_ITERS=1 \
              LEAKAGE_CALLGRIND_WORKLOADS="crypto_bigint-pow_mod crypto_bigint-inv_mod rsa-pkcs1v15-sign jwe-rsa-oaep-decrypt p256-sign p384-sign secp256k1-sign" \
              LEAKAGE_CALLGRIND_THRESHOLDS=leakage_harness/callgrind_smoke_thresholds.tsv \
              LEAKAGE_CALLGRIND_REPORT=leakage-callgrind.tsv \
              bash leakage_harness/callgrind_check.sh
            cat leakage-callgrind.tsv
          '

  prove:
    name: prove (ubuntu-latest, nix devShell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Preflight (provers visible)
        run: |
          nix develop --impure --command bash -c '
            why3 --version | head -1
            z3 --version | head -1
            cvc5 --version | head -1
            alt-ergo --version | head -1
            moon version | head -1
          '

      - name: moon prove
        run: |
          nix develop --impure --command bash proofs/setup.sh
          nix develop --impure --command bash -c '
            unset MOON_HOME
            moon update >/dev/null
            bash proofs/prove.sh
          '
